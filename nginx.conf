server {
    listen 80;
    server_name tudominio.com www.tudominio.com;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — todas las rutas apuntan a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend API
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy al servidor TUS para uploads
    # Se usa resolver + variable para que Nginx resuelva el DNS
    # en cada request y no falle al arrancar si tusd aún no está listo
    location /files/ {
        resolver 127.0.0.11 valid=10s;
        set $tusd_upstream http://tusd:8080;    # puerto interno de tusd
        proxy_pass $tusd_upstream/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
        client_max_body_size 2G;
    }
}
